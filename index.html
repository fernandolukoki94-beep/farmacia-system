<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Farmácia</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 360px; text-align: center; border: 1px solid #333; }
        h2 { color: #2ecc71; margin-bottom: 8px; font-size: 24px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 24px; }
        input { width: 90%; padding: 12px; margin-bottom: 16px; border: 1px solid #444; background-color: #2a2a2a; color: white; border-radius: 6px; font-size: 14px; }
        input:focus { border-color: #2ecc71; outline: none; }
        button { width: 97%; background-color: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #27ae60; }
        .erro { color: #e74c3c; margin-top: 12px; font-size: 14px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>🔐 Acesso Restrito</h2>
        <p>Painel de Controlo do Stock</p>
        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Utilizador (admin)" required>
            <input type="password" id="senha" placeholder="Palavra-passe (farmacia123)" required>
            <button type="submit">Entrar no Sistema</button>
        </form>
        <div id="mensagemErro" class="erro">Utilizador ou senha incorretos!</div>
    </div>

    <script>
        const API_URL = "https://farmacia-system.onrender.com"; 

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            const msgErro = document.getElementById('mensagemErro');

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });

                const dados = await res.json();

                if (res.ok && dados.autorizado) {
                    localStorage.setItem('logado', 'true');
                    window.location.href = "painel.html";
                } else {
                    msgErro.style.display = "block";
                    msgErro.innerText = dados.erro || "Acesso negado.";
                }
            } catch (erro) {
                console.warn("API offline. Usando validação local de contingência para o portfólio.");
                // Sistema de segurança reserva caso o Render esteja em modo de espera (free tier)
                if (usuario === "admin" && senha === "farmacia123") {
                    localStorage.setItem('logado', 'true');
                    window.location.href = "painel.html";
                } else {
                    msgErro.style.display = "block";
                    msgErro.innerText = "Utilizador ou senha incorretos!";
                }
            }
        });
    </script>
</body>
</html>
